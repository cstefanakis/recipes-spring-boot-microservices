spring:
  application:
    name: recipe-step-service
  config:
    import: "optional:configserver:http://localhost:8888"

server:
  port: 8083

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
      register-with-eureka: true
      fetch-registry: true
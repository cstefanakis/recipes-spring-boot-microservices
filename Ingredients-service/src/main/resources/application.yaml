spring:
  application:
    name: Ingredients-service
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    config:
      enabled: false

server:
  port: 8081

datasource:
  driver-class-name: org.postgresql.Driver
  url: jdbc:postgresql://localhost:5432/ingredients
  username: test
  password: test

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
